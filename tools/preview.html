<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>preview</title></head>
  <body style="margin: 0; background: #1a2028">
    <script type="module">
      import * as THREE from 'three';
      import { makeTestBoiler } from '../src/three/factory/testBoiler.ts';

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(400, 500);
      document.body.appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a2028);
      const cam = new THREE.PerspectiveCamera(40, 400 / 500, 0.1, 100);
      cam.position.set(3.2, 2.2, 3.2);
      cam.lookAt(0, 1.1, 0);
      scene.add(new THREE.HemisphereLight(0x8a9ab0, 0x3a2a1a, 2.2));
      const key = new THREE.DirectionalLight(0xffd9a0, 2);
      key.position.set(3, 5, 2);
      scene.add(key);
      scene.add(makeTestBoiler());
      renderer.render(scene, cam);
      window.__ready = true;
    </script>
  </body>
</html>
