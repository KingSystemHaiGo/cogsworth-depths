<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模型与 HUD 展示台 — Cogsworth Depths</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0a0e12; overflow: hidden; font-family: Georgia, 'Microsoft YaHei', serif; }
      #app { position: fixed; inset: 0; }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
      #labels { position: fixed; inset: 0; pointer-events: none; }
      .tag {
        position: absolute;
        transform: translate(-50%, 0);
        color: #d8c9a3;
        font-size: 13px;
        letter-spacing: 1px;
        text-shadow: 0 1px 3px #000;
        white-space: nowrap;
      }
      .tag b { color: #e8c877; display: block; text-align: center; font-size: 14px; }
      .tag span { color: #9a8a68; font-size: 11px; }
      #hud-title {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        color: #e8c877;
        letter-spacing: 6px;
        font-size: 20px;
        text-shadow: 0 0 14px rgba(232, 200, 119, 0.5);
        pointer-events: none;
      }
      #mode {
        position: fixed;
        right: 16px;
        top: 12px;
        color: #9a8a68;
        font-size: 13px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="three-canvas"></canvas>
      <canvas id="pixi-canvas"></canvas>
      <div id="labels"></div>
      <div id="hud-title">展 示 台</div>
      <div id="mode">滚动切换:模型展 / HUD 演示</div>
    </div>
    <script type="module" src="/src/showcase/main.ts"></script>
  </body>
</html>
